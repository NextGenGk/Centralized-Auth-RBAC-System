services:
  # ── Infrastructure ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: auth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       authdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: auth_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Auth Service ─────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      target:  production
    container_name: auth_service
    restart: unless-stopped
    env_file: ./auth-service/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/authdb
      REDIS_URL:    redis://redis:6379
      NODE_ENV:     production
    ports:
      - "3001:3001"
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Orders Service ───────────────────────────────────────────
  orders-service:
    build:
      context: ./orders-service
      target:  production
    container_name: orders_service
    restart: unless-stopped
    env_file: ./orders-service/.env
    environment:
      AUTH_SERVICE_URL: http://auth-service:3001
      NODE_ENV:         production
    ports:
      - "3002:3002"
    networks:
      - app-network
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3002/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
